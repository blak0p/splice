name: Bug Report
description: Report a bug to help us improve splice
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue and what you expected to happen.
      placeholder: "Tell us what went wrong"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run 'splice.Merge(...)'
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error messages or logs.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: search
    attributes:
      label: Search
      options:
        - label: |
            I searched for existing open and closed issues before opening this
          required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
    validations:
      required: false
