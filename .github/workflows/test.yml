name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run Tests
        run: CGO_ENABLED=1 go test ./... -v -count=1
